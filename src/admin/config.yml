locale: "zh_Hans"
local_backend: true

backend:
  name: github
  repo: raylee30/media-dental
  branch: main
  base_url: https://www.mjsmiles.com
  auth_endpoint: oauth

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "网站内容"
    files:
      - name: "home"
        label: "首页"
        file: "src/_data/home.json"
        format: "json"
        fields:
          - label: "搜索引擎信息"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - { label: "浏览器标题", name: "title", widget: "string" }
              - { label: "页面描述", name: "description", widget: "text" }
          - label: "品牌信息"
            name: "brand"
            widget: "object"
            collapsed: true
            fields:
              - { label: "品牌名称", name: "name", widget: "string" }
              - { label: "品牌副标题", name: "tagline", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image" }
          - label: "导航栏"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - { label: "按钮文字", name: "send_case_label", widget: "string" }
              - { label: "按钮链接", name: "send_case_link", widget: "string" }
          - label: "首页大图区域"
            name: "hero"
            widget: "object"
            fields:
              - { label: "背景图片", name: "image", widget: "image" }
              - { label: "图片说明", name: "image_alt", widget: "string" }
              - { label: "小标题", name: "eyebrow", widget: "string" }
              - { label: "主标题", name: "title", widget: "string" }
              - { label: "副标题", name: "subtitle", widget: "text" }
              - { label: "主按钮文字", name: "primary_button_label", widget: "string" }
              - { label: "主按钮链接", name: "primary_button_link", widget: "string" }
              - { label: "副按钮文字", name: "secondary_button_label", widget: "string" }
              - { label: "副按钮链接", name: "secondary_button_link", widget: "string" }
              - label: "亮点数据"
                name: "metrics"
                widget: "list"
                summary: "{{fields.value}}"
                fields:
                  - { label: "重点文字", name: "value", widget: "string" }
                  - { label: "说明文字", name: "label", widget: "string" }
          - label: "服务概览"
            name: "service_overview"
            widget: "list"
            summary: "{{fields.number}} - {{fields.title}}"
            fields:
              - { label: "编号", name: "number", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
          - label: "关于我们区域"
            name: "about"
            widget: "object"
            fields:
              - { label: "小标题", name: "eyebrow", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - label: "段落"
                name: "paragraphs"
                widget: "list"
                field: { label: "段落内容", name: "paragraph", widget: "text" }
              - { label: "按钮文字", name: "button_label", widget: "string" }
              - { label: "按钮链接", name: "button_link", widget: "string" }
              - label: "信息卡片"
                name: "facts"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "标题", name: "title", widget: "string" }
                  - { label: "描述", name: "description", widget: "text" }
          - label: "首页产品区域"
            name: "product_section"
            widget: "object"
            collapsed: true
            fields:
              - { label: "小标题", name: "eyebrow", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
              - { label: "首页显示产品数量", name: "max_items", widget: "number", value_type: "int", min: 1, max: 24 }
          - label: "能力介绍"
            name: "capabilities"
            widget: "object"
            fields:
              - { label: "小标题", name: "eyebrow", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
              - label: "能力项目"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "标题", name: "title", widget: "string" }
                  - { label: "描述", name: "description", widget: "text" }
          - label: "工作流程"
            name: "workflow"
            widget: "object"
            fields:
              - { label: "小标题", name: "eyebrow", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - label: "步骤"
                name: "steps"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "步骤标题", name: "title", widget: "string" }
                  - { label: "步骤描述", name: "description", widget: "text" }
          - label: "合作优势"
            name: "quality"
            widget: "object"
            fields:
              - { label: "小标题", name: "eyebrow", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - label: "优势列表"
                name: "items"
                widget: "list"
                field: { label: "优势内容", name: "item", widget: "string" }
          - label: "联系方式"
            name: "contact"
            widget: "object"
            fields:
              - { label: "小标题", name: "eyebrow", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
              - { label: "电话", name: "phone", widget: "string" }
              - { label: "电话链接", name: "phone_link", widget: "string" }
              - { label: "邮箱", name: "email", widget: "string" }
              - { label: "邮箱链接", name: "email_link", widget: "string" }
              - { label: "WhatsApp", name: "whatsapp", widget: "string" }
              - { label: "WhatsApp 链接", name: "whatsapp_link", widget: "string" }
              - { label: "地址", name: "address", widget: "text" }
          - label: "页脚"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "公司名称", name: "company_name", widget: "string" }
              - { label: "公司法定名称", name: "company_legal_name", widget: "string" }
              - { label: "版权文字", name: "copyright", widget: "string" }

  - name: "products"
    label: "产品管理"
    label_singular: "产品"
    folder: "src/products"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    identifier_field: "title"
    fields:
      - { label: "显示排序", name: "order", widget: "number", value_type: "int", min: 1 }
      - { label: "产品名称", name: "title", widget: "string" }
      - { label: "网址别名", name: "slug", widget: "string", hint: "只能使用小写英文、数字和中横线，例如 zirconia-crowns。" }
      - { label: "产品卡片缩写", name: "icon", widget: "string", hint: "用于产品卡片的小图标文字，例如 AC 或 IM。" }
      - { label: "分类/小标题", name: "category", widget: "string" }
      - { label: "列表页简短描述", name: "short_description", widget: "text" }
      - { label: "详情页产品介绍", name: "description", widget: "text" }
      - { label: "产品卡片图片", name: "card_image", widget: "image" }
      - { label: "产品卡片图片说明", name: "card_alt", widget: "string" }
      - label: "标签"
        name: "tags"
        widget: "list"
        field: { label: "标签", name: "tag", widget: "string" }
      - label: "轮播图片"
        name: "gallery"
        widget: "list"
        summary: "{{fields.caption}}"
        fields:
          - { label: "图片", name: "image", widget: "image" }
          - { label: "图片说明", name: "alt", widget: "string" }
          - { label: "图片下方文字", name: "caption", widget: "text" }
      - label: "产品详情"
        name: "details"
        widget: "list"
        summary: "{{fields.label}}"
        fields:
          - { label: "项目名", name: "label", widget: "string" }
          - { label: "内容", name: "text", widget: "text" }
      - label: "相关产品"
        name: "related_products"
        widget: "relation"
        collection: "products"
        search_fields: ["title", "slug"]
        value_field: "slug"
        display_fields: ["title"]
        multiple: true
        required: false
      - label: "询盘表单文案"
        name: "inquiry"
        widget: "object"
        fields:
          - { label: "询盘标题", name: "title", widget: "string" }
          - { label: "询盘说明", name: "description", widget: "text" }
          - { label: "数量输入框提示", name: "quantity_placeholder", widget: "string" }
          - { label: "留言输入框提示", name: "message_placeholder", widget: "string" }
      - label: "搜索引擎信息"
        name: "seo"
        widget: "object"
        collapsed: true
        fields:
          - { label: "浏览器标题", name: "title", widget: "string" }
          - { label: "页面描述", name: "description", widget: "text" }
